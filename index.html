<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="./styles/index.css" />
    <title>Contact list on JS</title>
  </head>
  <body>
    <div class="snippet-holidays">
      <a class="snippet-link" href="">
        <img class="snippet-img" src="./snippet.jpg" />
      </a>
      <button class="snippet-close-button">-</button>
    </div>

    <div class="contact">
      <h1 class="contact__title">Contact list on JS</h1>

      <!-- Форма добавления контакта -->
      <form class="contact__form" id="contactForm">
        <div class="contact__field field">
          <label class="field__label" for="name">Name</label>
          <input
            class="field__input"
            id="name"
            name="name"
            type="text"
            placeholder="Your name"
            autocomplete="off"
          />
          <span class="error" id="name-error"></span>

          <label class="field__label" for="vacancy">Vacancy</label>
          <input
            class="field__input"
            id="vacancy"
            name="vacancy"
            type="text"
            placeholder="Vacancy"
            autocomplete="off"
          />
          <span class="error" id="vacancy-error"></span>

          <label class="field__label" for="phone">Phone</label>
          <input
            class="field__input"
            id="phone"
            name="phone"
            type="tel"
            placeholder="+7-999-999-99-99"
            autocomplete="off"
          />
          <span class="error" id="phone-error"></span>

          <button class="button" type="submit" id="addBtn">Add</button>
          <button class="button" type="button" id="clearBtn">Clear list</button>
          <button class="button" type="button" id="searchBtn">Search</button>
        </div>
      </form>

      <!-- Алфавитный индекс -->
      <ul class="alphabet" id="alphabet"></ul>

      <!-- Список контактов -->
      <div class="contacts-list" id="contactsList"></div>

      <!-- Модальное окно редактирования -->
      <div
        class="modal"
        name="editModal"
        id="editModal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title"
      >
        <div class="modal-content">
          <button
            class="modal-close__btn"
            id="modal-close__btn"
            aria-label="Закрыть"
          >
            ×
          </button>
          <h2 id="modal-title">Edit contact</h2>

          <form id="editForm">
            <label for="editName" class="visually-hidden">Name</label>
            <input
              type="text"
              name="editName"
              id="editName"
              placeholder="Name"
              aria-describedby="editName-error"
            />
            <span class="error" id="editName-error" role="alert"></span>

            <label for="editVacancy" class="visually-hidden">Vacancy</label>
            <input
              type="text"
              name="editVacancy"
              id="editVacancy"
              placeholder="Vacancy"
              aria-describedby="editVacancy-error"
            />
            <span class="error" id="editVacancy-error" role="alert"></span>

            <label for="editPhone" class="visually-hidden">Phone</label>
            <input
              type="tel"
              id="editPhone"
              placeholder="Phone"
              aria-describedby="editPhone-error"
            />
            <span class="error" id="editPhone-error" role="alert"></span>

            <button class="button" type="submit">Save</button>
            <button class="button" type="button" id="cancelBtn">Cancel</button>
          </form>
        </div>
      </div>

      <!-- Модальное окно поиска -->
      <div
        class="modal"
        id="searchModal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title"
      >
        <div class="modal-content">
          <button
            class="modal-close__btn"
            id="modal-close__btn"
            aria-label="Закрыть"
          >
            ×
          </button>
          <h2 id="modal-title">Search contacts</h2>
          <label for="searchInput" class="visually-hidden"
            >Search by name</label
          >
          <input type="text" id="searchInput" placeholder="Search by name..." />
          <div id="searchResults"></div>
        </div>
      </div>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
