<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module" src="index.js"></script>
    <link rel="stylesheet" href="./styles/index.css" />
    <title>Contact list on JS</title>
  </head>
  <body>
    <div class="contact">
      <h1 class="contact__title">Contact list on JS</h1>
      <form class="contact__form">
        <div class="contact__field field">
          <label class="field__label" for="name">Name</label>
          <input
            class="field__input"
            id="name"
            type="text"
            placeholder="Your name"
            autocomplete="off"
          />
          <label class="field__label" for="vacancy">Vacancy</label>
          <input
            class="field__input"
            id="vacancy"
            type="text"
            placeholder="Vacancy"
            autocomplete="off"
          />
          <label class="field__label" for="phone">Phone</label>
          <input
            class="field__input"
            id="phone"
            type="tel"
            placeholder="+7-999-999-99-99"
            autocomplete="off"
          />
          <button class="button" type="submit" id="add">Add</button>
          <button class="button" type="button">Clear list</button>
          <button class="button" type="button">Search</button>
        </div>
      </form>

      <ul class="alphabet"></ul>
    </div>
  </body>
</html>
